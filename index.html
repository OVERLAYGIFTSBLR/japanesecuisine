<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakura Kitchen — AR Menu</title>
  <meta name="description" content="Interactive AR menu for Sakura Kitchen — authentic Japanese cuisine with 3D dish previews." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <!-- model-viewer: AR + 3D on Android (WebXR/SceneViewer) and iOS (Quick Look) -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #1a1208;
      --paper:     #fdf8f0;
      --surface:   #fff9f2;
      --accent:    #c0392b;
      --gold:      #b8860b;
      --muted:     #7a6a55;
      --border:    rgba(139,100,50,0.15);
      --border-md: rgba(139,100,50,0.28);
      --tag-veg:   #2d6a4f;
      --tag-new:   #c0392b;
      --tag-dotd:  #b8860b;
      --shadow:    0 4px 20px rgba(26,18,8,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .site-header {
      background: var(--ink);
      color: #fff;
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(192,57,43,0.12) 0%, transparent 60%),
        radial-gradient(circle at 80% 50%, rgba(184,134,11,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .header-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .header-title em { font-style: italic; color: rgba(255,255,255,0.7); }

    .header-sub {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 18px;
    }

    .ar-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.7);
    }

    .ar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e74c3c;
      flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.8)} }

    /* ── LANGUAGE PICKER ─────────────────────────────── */
    #language-picker { position: relative; z-index: 10; margin-bottom: 16px; }

    #lang-select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    #lang-select option { background: #1a1208; color: white; }

    /* ── STICKY TABS ─────────────────────────────────── */
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }

    .tabs-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 10px 0;
    }

    .tabs-inner::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .tab-btn:hover { border-color: var(--border-md); color: var(--ink); }
    .tab-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    /* ── MAIN ────────────────────────────────────────── */
    .main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    .state-box { text-align: center; padding: 4rem 1rem; color: var(--muted); }

    .state-box .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-box p { font-size: 14px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 0.75rem;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-label span { flex: 1; height: 1px; background: var(--border); }

    /* ── CARDS ───────────────────────────────────────── */
    .items-grid { display: flex; flex-direction: column; gap: 10px; }

    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-card:hover {
      border-color: var(--border-md);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-row { display: flex; gap: 14px; align-items: flex-start; }

    .card-thumb {
      width: 64px; height: 64px;
      flex-shrink: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, #f5ead6 0%, #e8d5b0 100%);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      position: relative;
    }

    .ar-pill {
      position: absolute;
      bottom: 3px; right: 3px;
      background: var(--ink);
      color: #fff;
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 2px 5px;
      border-radius: 5px;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.4;
    }

    .card-body { flex: 1; min-width: 0; }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }

    .dish-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--ink);
    }

    .dish-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      color: var(--muted);
    }

    .tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 5px 0 7px; }

    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .tag-veg  { background: #d6f0e4; color: var(--tag-veg); }
    .tag-new  { background: #fde8e8; color: var(--tag-new); }
    .tag-dotd { background: #fef3d0; color: var(--tag-dotd); }

    .dish-desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 8px; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; }

    .dish-price { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); }

    .price-sym { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); margin-right: 1px; }

    .ar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .ar-btn:hover { opacity: 0.78; }
    .ar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── MODAL ───────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,6,2,0.72);
      z-index: 9000;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    @media (min-width: 540px) { .modal-overlay { align-items: center; padding: 1.5rem; } }

    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--paper);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 92vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      position: relative;
      animation: slideUp 0.25s ease;
    }

    @media (min-width: 540px) { .modal-card { border-radius: 20px; animation: fadeIn 0.2s ease; } }

    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: none; } }

    .modal-viewer-wrap {
      width: 100%;
      height: 300px;
      background: linear-gradient(160deg, #1c140a 0%, #2e2112 100%);
      border-radius: 20px 20px 0 0;
      position: relative;
      overflow: hidden;
    }

    /*
      model-viewer MUST be display:block with explicit height.
      --progress-bar-color matches brand gold.
      The component renders its own native AR button when AR is
      available on device — we never call activateAR() from JS.
    */
    model-viewer {
      display: block;
      width: 100%;
      height: 300px;
      background: transparent;
      --progress-bar-color: #b8860b;
      --progress-mask: transparent;
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      line-height: 1;
      transition: background 0.15s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.25); }

    .viewer-hint {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      white-space: nowrap;
    }

    .modal-body { padding: 1.4rem 1.5rem 1.8rem; }

    .modal-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; margin-bottom: 4px; }
    .modal-jp   { font-family: 'Noto Serif JP', serif; font-size: 14px; color: var(--muted); margin-bottom: 12px; }

    .modal-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      padding-left: 12px;
      border-left: 2px solid var(--border);
      margin-bottom: 18px;
    }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .modal-price { font-family: 'Playfair Display', serif; font-size: 30px; }

    /* ── FOOTER ──────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      line-height: 1.8;
    }

    .menu-card.unavailable { opacity: 0.45; pointer-events: none; }
  </style>
</head>
<body>

<!-- ═══════════════════ HEADER ═══════════════════════ -->
<header class="site-header">
  <div id="language-picker">
    <select id="lang-select">
      <option value="en">English</option>
      <option value="jp">日本語</option>
      <option value="kn">ಕನ್ನಡ</option>
      <option value="ta">தமிழ்</option>
      <option value="ml">മലയാളം</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>
  <p class="header-jp">日本料理</p>
  <h1 class="header-title">Sakura <em>Kitchen</em></h1>
  <p class="header-sub" id="ui-sub-tag">Authentic Japanese Cuisine</p>
  <span class="ar-badge">
    <span class="ar-dot"></span>
    <span id="ui-ar-badge">Interactive 3D &amp; AR Preview</span>
  </span>
</header>

<!-- ═══════════════════ TABS ════════════════════════ -->
<nav class="tabs-wrap" aria-label="Menu categories">
  <div class="tabs-inner" id="tabs-inner"></div>
</nav>

<!-- ═══════════════════ MAIN ════════════════════════ -->
<main class="main">
  <div class="state-box" id="loading-state">
    <div class="spinner"></div>
    <p id="ui-loading">Loading menu…</p>
  </div>
  <div id="items-container" style="display:none"></div>
</main>

<!-- ═══════════════════ MODAL ════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Dish detail">
  <div class="modal-card">
    <div class="modal-viewer-wrap" id="modal-viewer-wrap">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <span class="viewer-hint">drag to rotate </span>
    </div>
    <div class="modal-body">
      <h2 class="modal-name" id="modal-name"></h2>
      <p  class="modal-jp"   id="modal-jp"></p>
      <div class="tags-row"  id="modal-tags"></div>
      <p  class="modal-desc" id="modal-desc"></p>
      <div class="modal-footer">
        <div class="modal-price" id="modal-price"></div>
        <div class="tags-row"    id="modal-tags2"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ FOOTER ═══════════════════════ -->
<footer class="site-footer">
  Tap any dish to view in 3D &nbsp;·&nbsp; Prices in ₹ &nbsp;·&nbsp; 🌿 Vegetarian friendly<br>
  <span style="opacity:0.5">AR requires a compatible mobile device</span>
</footer>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const SHEET_ID  = '1QAReLCzWLQEfNyY9V6Cg5VbGPqmbXh4XCZ_RCQSRlz0';
const SHEET_GID = '0';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

// Keys MUST match the sheet "name" column exactly (lowercase).
const EMOJI_MAP = {
  'gyoza':            '🥟',
  'edamame':          '🫘',
  'karaage':          '🍗',
  'miso soup':        '🍵',
  'takoyaki':         '🐙',
  'agedashi tofu':    '🫕',
  'ramen':            '🍜',
  'salmon sashimi':   '🐟',
  'tempura':          '🍤',
  'matcha ice cream': '🍦',  // FIX: was 'matcha-ice-cream' (dashes) — now matches sheet
};

const I18N = {
  en: { sub:'Authentic Japanese Cuisine',     badge:'Interactive 3D & AR Preview',           veg:'veg',        loading:'Loading menu…' },
  jp: { sub:'本物の日本料理',                  badge:'インタラクティブ3DとARプレビュー',          veg:'ベジ',       loading:'読み込み中…' },
  kn: { sub:'ಅಧಿಕೃತ ಜಪಾನೀಸ್ ಆಹಾರ',         badge:'ಸಂವಾದಾತ್ಮಕ 3D ಮತ್ತು AR ಮುನ್ನೋಟ',       veg:'ಸಸ್ಯಹಾರಿ', loading:'ಲೋಡ್ ಆಗುತ್ತಿದೆ…' },
  ta: { sub:'உண்மையான ஜப்பானிய உணவு',       badge:'ஊடாடும் 3D மற்றும் AR மாதிரிக்காட்சி', veg:'சைவம்',      loading:'ஏற்றப்படுகிறது…' },
  ml: { sub:'ആധികാരിക ജാപ്പനീസ് വിഭവങ്ങൾ', badge:'ഇന്ററാക്ടീവ് 3D & AR പ്രിവ്യൂ',         veg:'വെജ്',       loading:'ലോഡ് ചെയ്യുന്നു…' },
  te: { sub:'ప్రామాణిక జపనీస్ వంటకాలు',     badge:'ఇంటరాక్టివ్ 3D & AR ప్రివ్యూ',          veg:'శాఖాహారం',   loading:'లోడ్ అవుతోంది…' },
};

const CAT_LABELS = {
  all:     { en:'All',        jp:'すべて',    kn:'ಎಲ್ಲವೂ',        ta:'அனைத்தும்',     ml:'എല്ലാം',         te:'అన్నీ' },
  starter: { en:'Starters',   jp:'スターター', kn:'ಆರಂಭಿಕಗಳು',    ta:'துவக்கிகள்',    ml:'സ്റ്റാർട്ടറുകൾ', te:'ప్రారంభకాలు' },
  ramen:   { en:'Ramen',      jp:'ラーメン',   kn:'ರಾಮೆನ್',        ta:'ராமன்',         ml:'രാമെൻ',          te:'రామెన్' },
  sushi:   { en:'Sushi',      jp:'寿司',       kn:'ಸುಶಿ',          ta:'சுஷி',          ml:'സുഷി',           te:'సుషీ' },
  rice:    { en:'Mains',      jp:'メイン',     kn:'ಮುಖ್ಯ ಆಹಾರ',   ta:'முக்கிய உணவு',  ml:'പ്രധാന ഭക്ഷണം',  te:'ప్రధాన వంటకాలు' },
  drinks:  { en:'Desserts',   jp:'デザート',   kn:'ಸಿಹಿತಿಂಡಿಗಳು', ta:'இனிப்புகள்',    ml:'ഡെസേർട്ടുകൾ',    te:'తీపి వంటకాలు' },
};

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let allDishes      = [];
let rawRows        = [];
let activeCategory = 'all';
let currentLang    = 'en';

// ─────────────────────────────────────────────────────────────
//  CSV PARSER  (handles quoted fields containing commas)
// ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]).map(h => h.trim().toLowerCase());
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj  = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

function splitLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"' && !inQ) { inQ = true; continue; }
    if (ch === '"' && inQ)  { if (line[i+1] === '"') { cur += '"'; i++; } else { inQ = false; } continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

// ─────────────────────────────────────────────────────────────
//  ROW → DISH
//
//  GLB path fix:
//  The sheet stores:  3d%20model/Gyoza/Gyoza.glb
//  decodeURIComponent turns that into: 3d model/Gyoza/Gyoza.glb
//  The browser then resolves it relative to index.html — which is
//  exactly what we need when hosted on GitHub Pages alongside the
//  "3d model/" folder.
//  We do NOT replace spaces with dashes or any other transform.
// ─────────────────────────────────────────────────────────────
function rowToDish(row) {
  const truthy = v => ['true','yes','1'].includes((v || '').toLowerCase());

  const sfx  = currentLang !== 'en' ? `_${currentLang}` : '';
  const desc = row[`description${sfx}`] || row['description'] || '';
  const name = row[`name${sfx}`]        || row['name']        || '';

  // Decode percent-encoded path from sheet, keep spaces as spaces.
  const rawGlb  = (row['glb_url'] || '').trim();
  const glbPath = rawGlb ? decodeURIComponent(rawGlb) : '';

  return {
  id:        row['id']       || '',
  name,
  category:  (row['category'] || 'other').toLowerCase(),
  jp:        row['jp_name']  || '',
  desc,
  price:     parseInt(row['price'] || '0', 10),
  veg:       truthy(row['veg']),
  dotd:      truthy(row['dish of the day'] || row['dotd']),
  isNew:     truthy(row['new']),
  available: truthy(row['available']),
  glbPath,
  scale:     parseFloat(row['scale'] || '1') || 1,   // ✅ NEW
  emoji:     EMOJI_MAP[(row['name'] || '').toLowerCase()] || '🍽️',
};
}
// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
function tagHTML(d) {
  const t = I18N[currentLang] || I18N.en;
  return [
    d.veg   ? `<span class="tag tag-veg">🌿 ${t.veg}</span>` : '',
    d.isNew ? '<span class="tag tag-new">new</span>'          : '',
    d.dotd  ? '<span class="tag tag-dotd">★ chef\'s pick</span>' : '',
  ].join('');
}

function catLabel(cat) {
  const map = CAT_LABELS[cat];
  return map ? (map[currentLang] || map.en) : (cat.charAt(0).toUpperCase() + cat.slice(1));
}

// ─────────────────────────────────────────────────────────────
//  RENDER TABS
// ─────────────────────────────────────────────────────────────
function renderTabs() {
  const cats = ['all', ...new Set(allDishes.map(d => d.category))];
  const wrap = document.getElementById('tabs-inner');
  wrap.innerHTML = cats.map(c =>
    `<button class="tab-btn${c === activeCategory ? ' active' : ''}" data-cat="${c}">${catLabel(c)}</button>`
  ).join('');
  wrap.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => { activeCategory = btn.dataset.cat; renderTabs(); renderItems(); })
  );
}

// ─────────────────────────────────────────────────────────────
//  RENDER ITEMS
// ─────────────────────────────────────────────────────────────
const SVG_CUBE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;

function cardHTML(d) {
  return `
    <div class="menu-card${d.available ? '' : ' unavailable'}" data-id="${d.id}" role="button" tabindex="0" aria-label="View ${d.name} in 3D">
      <div class="card-row">
        <div class="card-thumb">
          <span>${d.emoji}</span>
          ${d.glbPath ? '<span class="ar-pill">AR</span>' : ''}
        </div>
        <div class="card-body">
          <div class="name-row">
            <span class="dish-name">${d.name}</span>
            ${d.jp ? `<span class="dish-jp">${d.jp}</span>` : ''}
          </div>
          <div class="tags-row">${tagHTML(d)}</div>
          <p class="dish-desc">${d.desc}</p>
          <div class="card-footer">
            <div class="dish-price"><span class="price-sym">₹</span>${d.price.toLocaleString('en-IN')}</div>
            ${d.glbPath ? `<button class="ar-btn" data-id="${d.id}">${SVG_CUBE} View in AR</button>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

function renderItems() {
  const filtered  = activeCategory === 'all' ? allDishes : allDishes.filter(d => d.category === activeCategory);
  const container = document.getElementById('items-container');

  if (activeCategory === 'all') {
    const grouped = {};
    filtered.forEach(d => { (grouped[d.category] = grouped[d.category] || []).push(d); });
    container.innerHTML = Object.entries(grouped).map(([cat, items]) =>
      `<div class="section-label"><span></span>${catLabel(cat)}<span></span></div>
       <div class="items-grid">${items.map(cardHTML).join('')}</div>`
    ).join('');
  } else {
    container.innerHTML = `<div class="items-grid">${filtered.map(cardHTML).join('')}</div>`;
  }

  container.querySelectorAll('.menu-card').forEach(card =>
    card.addEventListener('click', () => openModal(card.dataset.id))
  );
  container.querySelectorAll('.ar-btn').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); })
  );
}

// ─────────────────────────────────────────────────────────────
//  MODAL
//
//  AR implementation notes:
//  • src = decoded relative path  ("3d model/Gyoza/Gyoza.glb")
//  • ar-modes = "webxr scene-viewer quick-look"
//      – webxr       → Chrome on Android (immersive AR)
//      – scene-viewer→ Google Scene Viewer fallback on Android
//      – quick-look  → Safari / iOS AR Quick Look
//  • We do NOT call mv.activateAR() — it throws on desktop and
//    is unreliable. model-viewer shows its own AR button on
//    supported devices automatically.
//  • ios-src (USDZ): uncomment if you have .usdz files next to
//    the .glb files.  Quick Look on iOS will use them directly.
// ─────────────────────────────────────────────────────────────
function openModal(id) {
  const d = allDishes.find(x => x.id === id);
  if (!d) return;

  document.getElementById('modal-name').textContent = d.name;
  document.getElementById('modal-jp').textContent   = d.jp;
  document.getElementById('modal-desc').textContent = d.desc;
  document.getElementById('modal-price').innerHTML  =
    `<span style="font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted)">₹</span>${d.price.toLocaleString('en-IN')}`;
  document.getElementById('modal-tags').innerHTML   = tagHTML(d);
  document.getElementById('modal-tags2').innerHTML  = tagHTML(d);

  const vw   = document.getElementById('modal-viewer-wrap');
  const prev = vw.querySelector('model-viewer, .no-model');
  if (prev) prev.remove();

  if (d.glbPath) {
    const mv = document.createElement('model-viewer');

mv.setAttribute('src', d.glbPath);


// ✅ SCALE FROM SHEET
const s = (d.scale || 1).toFixed(4);
mv.setAttribute('scale', `${s} ${s} ${s}`);


// 🔒 LOCK CAMERA DISTANCE
mv.setAttribute('camera-orbit', '0deg 75deg 1.2m');
mv.setAttribute('min-camera-orbit', '0deg 75deg 1.2m');
mv.setAttribute('max-camera-orbit', '0deg 75deg 1.2m');

// 🔒 FIX AR SIZE
mv.setAttribute('ar-scale', 'fixed');

// CLEAN UI
mv.setAttribute('interaction-prompt', 'none');

    // Uncomment next line if you have .usdz files alongside .glb:
    // mv.setAttribute('ios-src', d.glbPath.replace(/\.glb$/i, '.usdz'));
    mv.setAttribute('ar',           '');
    mv.setAttribute('ar-modes',     'webxr scene-viewer quick-look');
    mv.setAttribute('ar-placement', 'floor');
    mv.setAttribute('camera-controls', '');
    mv.setAttribute('auto-rotate',  '');
    mv.setAttribute('shadow-intensity', '1');
    mv.setAttribute('environment-image', 'neutral');
    mv.setAttribute('exposure',     '1');
    mv.setAttribute('loading',      'eager');
    mv.style.cssText = 'display:block;width:100%;height:300px;background:transparent;';
    vw.insertBefore(mv, vw.querySelector('.viewer-hint'));
  } else {
    const ph = document.createElement('div');
    ph.className = 'no-model';
    ph.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;';
    ph.innerHTML = `<span style="font-size:72px">${d.emoji}</span>
                    <span style="font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.3)">3D model not available</span>`;
    vw.insertBefore(ph, vw.querySelector('.viewer-hint'));
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  // Remove model-viewer completely to stop streaming / free memory
  const mv = document.querySelector('#modal-viewer-wrap model-viewer');
  if (mv) mv.remove();
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────────────────────
//  LANGUAGE SWITCH
// ─────────────────────────────────────────────────────────────
document.getElementById('lang-select').addEventListener('change', e => {
  currentLang = e.target.value;
  const t = I18N[currentLang] || I18N.en;
  document.getElementById('ui-sub-tag').textContent  = t.sub;
  document.getElementById('ui-ar-badge').textContent = t.badge;
  document.getElementById('ui-loading').textContent  = t.loading;
  allDishes = rawRows.map(rowToDish).filter(d => d.name);
  renderTabs();
  renderItems();
});

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
async function init() {
  const loadingEl = document.getElementById('loading-state');
  const container = document.getElementById('items-container');
  try {
    const res  = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    rawRows    = parseCSV(text);
    allDishes  = rawRows.map(rowToDish).filter(d => d.name);
    if (!allDishes.length) throw new Error('No dishes found.');
    loadingEl.style.display = 'none';
    container.style.display = 'block';
    renderTabs();
    renderItems();
  } catch (err) {
    console.error('Menu load error:', err);
    loadingEl.innerHTML = `
      <p style="color:#c0392b;font-weight:500;margin-bottom:8px">Could not load menu data</p>
      <p style="font-size:13px;line-height:1.7">
        Make sure your sheet is published:<br>
        <strong>File → Share → Publish to web → CSV</strong><br><br>
        Sheet ID in use:<br>
        <code style="background:#f0e8d8;padding:2px 6px;border-radius:4px;font-size:11px">${SHEET_ID}</code>
      </p>`;
  }
}

init();
</script>
</body>
</html>
